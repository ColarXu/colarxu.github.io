# ==========================================
# 1. 站点基础信息
# ==========================================
baseURL = "https://ColarXu.github.io/"
title = "低噪音"
author = "许仙人"
theme = "PaperMod"
languageCode = "zh-cn"
hasCJKLanguage = true      # 确保中文搜索和字数统计准确
enableEmoji = true
enableRobotsTXT = true
googleAnalytics = "G-R637DHKY9E"

[pagination]
pagerSize = 5

# ==========================================
# 2. 输出与性能配置 (针对 RSS 报错的专项修复)
# ==========================================
[minify]
# 核心修复：必须设为 false。
# 否则压缩引擎会触发你旧文中的非法字符导致全站 RSS 崩溃。
minifyOutput = false 
disableXML = true

[outputs]
# 恢复全站 RSS 支持：首页、分类、标签页均生成 RSS
home = ["HTML", "RSS", "JSON"]
section = ["HTML", "RSS"]
taxonomy = ["HTML", "RSS"]
term = ["HTML", "RSS"]

[permalinks]
posts = "/:title/"         # 极简 URL 格式

# ==========================================
# 3. 导航菜单
# ==========================================
[[menu.main]]
    name = "🔍"
    url = "/search/"
    weight = 10

[[menu.main]]
    name = "文库"
    url = "/archives/"
    weight = 20

[[menu.main]]
    name = "标签"
    url = "/tags/"
    weight = 30

[[menu.main]]
    name = "关于"
    url = "/about/"
    weight = 40

# ==========================================
# 4. 搜索与渲染引擎
# ==========================================
[fuseOpts]
isCaseSensitive = false
shouldSort = true
location = 0
distance = 100
threshold = 0.4
minMatchCharLength = 0
keys = ["title", "permalink", "summary", "content"]

[markup.goldmark.renderer]
unsafe = true              # 允许 Markdown 中使用 HTML

# ==========================================
# 5. PaperMod 深度定制
# ==========================================
[params]
env = "production"
dateFormat = "2006.01.02"
defaultTheme = "auto"
description = "许仙人的数字花园。记录边牧养育实录、书影感悟、历史随笔。践行数字极简，分享效率工具。"
keywords = ["许仙人", "博客", "边牧", "数字极简", "效率工具"]

# 界面展示控制
ShowReadingTime = false
ShowWordCount = false
ShowCodeCopyButtons = true
ShowPostNavLinks = true
ShowLastMod = true
ShowShareButtons = false   # 隐私防护
ShowBreadCrumbs = false
UseHugoToc = true

# 核心：开启标签页面的 RSS 按钮
ShowRssButtonInSectionTermList = true
ShowFullTextinRSS = true # 保持这个主题特有开关开启

# 首页欢迎词
[params.homeInfoParams]
Title = "Hey 👋"
Content = "我是许仙人，很高兴认识你。世界很大，我们小声说话。"

# 社交图标
[[params.socialIcons]]
name = "email"
url = "mailto:colarxu@icloud.com"

[[params.socialIcons]]
name = "rss"
url = "/index.xml"

[params.assets]
favicon = "/favicon.ico"

# ==========================================
# 6. RSS 服务深度配置 (确保全文抓取)
# ==========================================
[services.rss]
    limit = 20          # 限制 RSS 里的文章数量，防止 170 篇一次性加载太慢
    fullContent = true  # 强制 RSS 服务输出全文内容

   